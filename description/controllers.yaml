# Configurazione ros2_control per Gazebo (esapode Genghis).
#
# Due controller girano dentro il controller_manager (avviato dal plugin
# gazebo_ros2_control):
#   - joint_state_broadcaster: PUBBLICA /joint_states leggendo lo stato dei giunti
#     simulati (posizione/velocita' vere). E' la "misura".
#   - leg_position_controller (JointTrajectoryController su interfaccia `position`):
#     controlla la POSIZIONE. All'attivazione TIENE la posizione corrente (niente
#     teletrasporto/esplosione) e INTERPOLA i comandi (movimenti morbidi). Non applica
#     forze -> evita il SetForce(NaN) che l'interfaccia `effort` generava al primo passo.
#
# Storia dei tentativi (perche' NON gli altri):
#   - `position` + JointGroupPositionController: scrive 0 all'avvio -> teletrasporto -> boom.
#   - `position_pid`: non supportata dalla versione apt (EOL) del plugin.
#   - `effort` + PID: la vecchia versione applica SetForce(NaN) al primo passo -> NaN istantaneo.
#   -> `position` + JTC (tiene+interpola) e' l'unico stabile qui. Cinematico: realismo di
#      coppia (brownout) rimandato a gz_ros2_control su Gazebo moderno.
#
# ORDINE dei giunti = actuated_joints() in gen_urdf.py (per gamba swing+lift su
# FL,FR,ML,MR,RL,RR, poi testa pan/tilt) = ordine usato da gazebo_bridge.

controller_manager:
  ros__parameters:
    update_rate: 200  # Hz (piu' alto = PID piu' reattivo, meno jitter)

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    leg_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

leg_position_controller:
  ros__parameters:
    joints:
      - FL_swing
      - FL_lift
      - FR_swing
      - FR_lift
      - ML_swing
      - ML_lift
      - MR_swing
      - MR_lift
      - RL_swing
      - RL_lift
      - RR_swing
      - RR_lift
      - head_pan_joint
      - head_tilt_joint
    # Interfaccia di comando POSIZIONE (cinematica): il JTC scrive setpoint di posizione
    # interpolati, niente PID/coppia -> nessun guadagno da tarare, niente SetForce(NaN).
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
