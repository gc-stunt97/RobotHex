# Configurazione ros2_control per Gazebo (esapode Genghis).
#
# Due controller girano dentro il controller_manager (avviato dal plugin
# gazebo_ros2_control):
#   - joint_state_broadcaster: PUBBLICA /joint_states leggendo lo stato dei giunti
#     simulati (posizione/velocita' vere). E' la "misura".
#   - leg_position_controller (JointTrajectoryController): controlla la POSIZIONE
#     applicando COPPIE via PID (interfaccia di comando `effort`). Fisico e stabile:
#     all'attivazione TIENE la posizione corrente (niente scalino/esplosione), e la
#     coppia e' limitata dal cap dell'interfaccia effort nell'URDF (~1.5 Nm, realistico).
#
# Perche' NON l'interfaccia `position`: su gazebo_ros2_control e' cinematica (SetPosition,
# teletrasporto) e su base flottante in contatto fa divergere il solutore. `position_pid`
# non e' supportata dalla versione apt del plugin. Quindi: effort + JTC con PID.
#
# ORDINE dei giunti = actuated_joints() in gen_urdf.py (per gamba swing+lift su
# FL,FR,ML,MR,RL,RR, poi testa pan/tilt) = ordine usato da gazebo_bridge.

controller_manager:
  ros__parameters:
    update_rate: 200  # Hz (piu' alto = PID piu' reattivo, meno jitter)

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    leg_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

leg_position_controller:
  ros__parameters:
    joints:
      - FL_swing
      - FL_lift
      - FR_swing
      - FR_lift
      - ML_swing
      - ML_lift
      - MR_swing
      - MR_lift
      - RL_swing
      - RL_lift
      - RR_swing
      - RR_lift
      - head_pan_joint
      - head_tilt_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    # Anello PID posizione->coppia per ogni giunto. La coppia in uscita e' comunque
    # tagliata dal cap effort dell'URDF (~1.5 Nm), quindi guadagni "decisi" restano
    # sicuri. i tiene conto della gravita' (offset di coppia a regime). DA TARARE dal vivo.
    gains:
      FL_swing: {p: 18.0, i: 1.0, d: 1.5, i_clamp: 1.0}
      FL_lift:  {p: 30.0, i: 3.0, d: 2.0, i_clamp: 2.0}
      FR_swing: {p: 18.0, i: 1.0, d: 1.5, i_clamp: 1.0}
      FR_lift:  {p: 30.0, i: 3.0, d: 2.0, i_clamp: 2.0}
      ML_swing: {p: 18.0, i: 1.0, d: 1.5, i_clamp: 1.0}
      ML_lift:  {p: 30.0, i: 3.0, d: 2.0, i_clamp: 2.0}
      MR_swing: {p: 18.0, i: 1.0, d: 1.5, i_clamp: 1.0}
      MR_lift:  {p: 30.0, i: 3.0, d: 2.0, i_clamp: 2.0}
      RL_swing: {p: 18.0, i: 1.0, d: 1.5, i_clamp: 1.0}
      RL_lift:  {p: 30.0, i: 3.0, d: 2.0, i_clamp: 2.0}
      RR_swing: {p: 18.0, i: 1.0, d: 1.5, i_clamp: 1.0}
      RR_lift:  {p: 30.0, i: 3.0, d: 2.0, i_clamp: 2.0}
      head_pan_joint:  {p: 6.0, i: 0.3, d: 0.8, i_clamp: 0.5}
      head_tilt_joint: {p: 6.0, i: 0.3, d: 0.8, i_clamp: 0.5}
